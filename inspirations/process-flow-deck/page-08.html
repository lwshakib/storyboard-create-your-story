<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 8 - Distributed Hub Systems</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            navy: '#2A3A4A',
                            orange: '#C65C17',
                            green: '#2D5A27',
                            red: '#8B1111',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="overflow-hidden font-sans bg-neutral-100 flex items-center justify-center min-h-screen">

    <!-- Fixed Area Container (960x540) -->
    <div class="relative h-[540px] w-[960px] overflow-hidden bg-white shadow-2xl flex flex-col">

        <!-- Header -->
        <div class="px-12 pt-10 flex justify-between items-end z-20">
            <div>
                <h1 class="text-xl font-outfit font-black text-brand-navy uppercase tracking-tighter leading-none text-2xl">Network Topology</h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] mt-1">Distributed Hub Connectivity</p>
            </div>
            <div class="border-b-[3px] border-slate-100 flex-1 mx-8 mb-1"></div>
            <div class="text-[10px] font-black font-outfit text-brand-navy/30 uppercase tracking-widest mb-1">
                Phase 08 / 2024
            </div>
        </div>

        <div class="flex-1 flex items-center justify-center relative mt-6 px-12">
            <!-- Nodes Container (Balanced Area) -->
            <div class="relative w-[640px] h-[320px]">
                
                 <!-- Connectors SVG (Smoother lines) -->
                 <svg viewBox="0 0 600 300" class="absolute inset-0 w-full h-full pointer-events-none stroke-slate-100" stroke-width="2" stroke-linecap="round">
                    <line x1="300" y1="230" x2="100" y2="100" />
                    <line x1="300" y1="230" x2="200" y2="50" />
                    <line x1="300" y1="230" x2="300" y2="30" />
                    <line x1="300" y1="230" x2="400" y2="50" />
                    <line x1="300" y1="230" x2="500" y2="100" />
                 </svg>

                 <!-- Sub-Nodes with Premium Styling -->
                 
                 <!-- Node 1: Finance (Left Bottom) -->
                 <div class="absolute top-[80px] left-[65px] flex flex-col items-center group">
                    <div class="relative w-14 h-14 flex items-center justify-center">
                        <div class="absolute inset-0 bg-brand-green/10 rounded-full blur group-hover:blur-md transition-all"></div>
                        <div class="relative w-14 h-14 rounded-full bg-white border-2 border-slate-50 shadow-lg flex items-center justify-center transition-transform group-hover:scale-110 group-hover:border-brand-green">
                            <i data-lucide="banknote" class="w-6 h-6 text-brand-green"></i>
                        </div>
                    </div>
                    <div class="mt-3 text-center">
                        <span class="font-outfit font-black text-brand-navy text-[9px] uppercase tracking-widest leading-none">Finance</span>
                    </div>
                 </div>

                 <!-- Node 2: Tech (Mid Left) -->
                 <div class="absolute top-[15px] left-[175px] flex flex-col items-center group">
                    <div class="relative w-14 h-14 flex items-center justify-center">
                        <div class="absolute inset-0 bg-brand-red/10 rounded-full blur group-hover:blur-md transition-all"></div>
                        <div class="relative w-14 h-14 rounded-full bg-white border-2 border-slate-50 shadow-lg flex items-center justify-center transition-transform group-hover:scale-110 group-hover:border-brand-red">
                            <i data-lucide="cpu" class="w-6 h-6 text-brand-red"></i>
                        </div>
                    </div>
                     <div class="mt-3 text-center">
                        <span class="font-outfit font-black text-brand-navy text-[9px] uppercase tracking-widest leading-none">Technology</span>
                    </div>
                 </div>

                 <!-- Node 3: HR (Top Center) -->
                 <div class="absolute top-[-35px] left-1/2 -translate-x-1/2 flex flex-col items-center group">
                    <div class="relative w-14 h-14 flex items-center justify-center">
                        <div class="absolute inset-0 bg-brand-navy/10 rounded-full blur group-hover:blur-md transition-all"></div>
                        <div class="relative w-14 h-14 rounded-full bg-white border-2 border-slate-50 shadow-lg flex items-center justify-center transition-transform group-hover:scale-110 group-hover:border-brand-navy">
                            <i data-lucide="users" class="w-6 h-6 text-brand-navy"></i>
                        </div>
                    </div>
                     <div class="mt-3 text-center">
                        <span class="font-outfit font-black text-brand-navy text-[9px] uppercase tracking-widest leading-none">Resources</span>
                    </div>
                 </div>

                 <!-- Node 4: Creative (Mid Right) -->
                 <div class="absolute top-[15px] right-[175px] flex flex-col items-center group">
                    <div class="relative w-14 h-14 flex items-center justify-center">
                        <div class="absolute inset-0 bg-brand-orange/10 rounded-full blur group-hover:blur-md transition-all"></div>
                        <div class="relative w-14 h-14 rounded-full bg-white border-2 border-slate-50 shadow-lg flex items-center justify-center transition-transform group-hover:scale-110 group-hover:border-brand-orange">
                            <i data-lucide="palette" class="w-6 h-6 text-brand-orange"></i>
                        </div>
                    </div>
                     <div class="mt-3 text-center">
                        <span class="font-outfit font-black text-brand-navy text-[9px] uppercase tracking-widest leading-none">Creative</span>
                    </div>
                 </div>

                 <!-- Node 5: Sales (Right Bottom) -->
                 <div class="absolute top-[80px] right-[65px] flex flex-col items-center group">
                    <div class="relative w-14 h-14 flex items-center justify-center">
                        <div class="absolute inset-0 bg-brand-red/10 rounded-full blur group-hover:blur-md transition-all"></div>
                        <div class="relative w-14 h-14 rounded-full bg-white border-2 border-slate-50 shadow-lg flex items-center justify-center transition-transform group-hover:scale-110 group-hover:border-brand-red">
                            <i data-lucide="trending-up" class="w-6 h-6 text-brand-red"></i>
                        </div>
                    </div>
                     <div class="mt-3 text-center">
                        <span class="font-outfit font-black text-brand-navy text-[9px] uppercase tracking-widest leading-none">Sales</span>
                    </div>
                 </div>

                 <!-- Main Core Hub (Elevated Center) -->
                 <div class="absolute bottom-[0px] left-1/2 -translate-x-1/2 group">
                    <div class="relative w-48 h-48 flex items-center justify-center">
                        <div class="absolute inset-0 bg-slate-100 rounded-full blur-2xl opacity-50 group-hover:opacity-100 transition-opacity"></div>
                        <div class="relative w-40 h-40 bg-white rounded-full flex flex-col items-center justify-center shadow-2xl border-[12px] border-slate-50 transition-transform group-hover:scale-105">
                            <i data-lucide="shield-check" class="w-12 h-12 text-brand-red mb-3"></i>
                            <div class="font-outfit font-black text-brand-navy text-[14px] uppercase tracking-[0.2em] leading-none mb-2">Management</div>
                            <div class="w-8 h-1 bg-brand-red rounded-full"></div>
                        </div>
                    </div>
                 </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="px-12 pb-10 flex justify-end items-center z-20">
            <div class="flex items-center gap-3">
                <div class="text-right">
                    <div class="text-[10px] font-black font-outfit text-brand-navy uppercase tracking-widest leading-none">Core Network</div>
                    <div class="text-[8px] font-bold text-slate-400 uppercase tracking-widest mt-1">Foundational Infrastructure Model</div>
                </div>
                <div class="h-10 w-[2px] bg-slate-100 mx-2"></div>
                <div class="bg-brand-navy text-white text-sm font-black font-outfit w-10 h-10 flex items-center justify-center rounded-lg shadow-lg">08</div>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('load', function() {
            lucide.createIcons();
        });
    </script>
</body>
</html>
