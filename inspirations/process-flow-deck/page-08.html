<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slide 8 - Distributed Hub Systems</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              outfit: ["Outfit", "sans-serif"],
            },
            colors: {
              brand: {
                navy: "#2A3A4A",
                orange: "#C65C17",
                green: "#2D5A27",
                red: "#8B1111",
              },
            },
          },
        },
      }
    </script>
  </head>
  <body
    class="flex min-h-screen items-center justify-center overflow-hidden bg-neutral-100 font-sans"
  >
    <!-- Fixed Area Container (960x540) -->
    <div
      class="relative flex h-[540px] w-[960px] flex-col overflow-hidden bg-white shadow-2xl"
    >
      <!-- Header -->
      <div class="z-20 flex items-end justify-between px-12 pt-10">
        <div>
          <h1
            class="font-outfit text-brand-navy text-2xl text-xl leading-none font-black tracking-tighter uppercase"
          >
            Network Topology
          </h1>
          <p
            class="mt-1 text-[10px] font-bold tracking-[0.2em] text-slate-400 uppercase"
          >
            Distributed Hub Connectivity
          </p>
        </div>
        <div class="mx-8 mb-1 flex-1 border-b-[3px] border-slate-100"></div>
        <div
          class="font-outfit text-brand-navy/30 mb-1 text-[10px] font-black tracking-widest uppercase"
        >
          Phase 08 / 2024
        </div>
      </div>

      <div class="relative mt-6 flex flex-1 items-center justify-center px-12">
        <!-- Nodes Container (Balanced Area) -->
        <div class="relative h-[320px] w-[640px]">
          <!-- Connectors SVG (Smoother lines) -->
          <svg
            viewBox="0 0 600 300"
            class="pointer-events-none absolute inset-0 h-full w-full stroke-slate-100"
            stroke-width="2"
            stroke-linecap="round"
          >
            <line x1="300" y1="230" x2="100" y2="100" />
            <line x1="300" y1="230" x2="200" y2="50" />
            <line x1="300" y1="230" x2="300" y2="30" />
            <line x1="300" y1="230" x2="400" y2="50" />
            <line x1="300" y1="230" x2="500" y2="100" />
          </svg>

          <!-- Sub-Nodes with Premium Styling -->

          <!-- Node 1: Finance (Left Bottom) -->
          <div
            class="group absolute top-[80px] left-[65px] flex flex-col items-center"
          >
            <div class="relative flex h-14 w-14 items-center justify-center">
              <div
                class="bg-brand-green/10 absolute inset-0 rounded-full blur transition-all group-hover:blur-md"
              ></div>
              <div
                class="group-hover:border-brand-green relative flex h-14 w-14 items-center justify-center rounded-full border-2 border-slate-50 bg-white shadow-lg transition-transform group-hover:scale-110"
              >
                <i data-lucide="banknote" class="text-brand-green h-6 w-6"></i>
              </div>
            </div>
            <div class="mt-3 text-center">
              <span
                class="font-outfit text-brand-navy text-[9px] leading-none font-black tracking-widest uppercase"
                >Finance</span
              >
            </div>
          </div>

          <!-- Node 2: Tech (Mid Left) -->
          <div
            class="group absolute top-[15px] left-[175px] flex flex-col items-center"
          >
            <div class="relative flex h-14 w-14 items-center justify-center">
              <div
                class="bg-brand-red/10 absolute inset-0 rounded-full blur transition-all group-hover:blur-md"
              ></div>
              <div
                class="group-hover:border-brand-red relative flex h-14 w-14 items-center justify-center rounded-full border-2 border-slate-50 bg-white shadow-lg transition-transform group-hover:scale-110"
              >
                <i data-lucide="cpu" class="text-brand-red h-6 w-6"></i>
              </div>
            </div>
            <div class="mt-3 text-center">
              <span
                class="font-outfit text-brand-navy text-[9px] leading-none font-black tracking-widest uppercase"
                >Technology</span
              >
            </div>
          </div>

          <!-- Node 3: HR (Top Center) -->
          <div
            class="group absolute top-[-35px] left-1/2 flex -translate-x-1/2 flex-col items-center"
          >
            <div class="relative flex h-14 w-14 items-center justify-center">
              <div
                class="bg-brand-navy/10 absolute inset-0 rounded-full blur transition-all group-hover:blur-md"
              ></div>
              <div
                class="group-hover:border-brand-navy relative flex h-14 w-14 items-center justify-center rounded-full border-2 border-slate-50 bg-white shadow-lg transition-transform group-hover:scale-110"
              >
                <i data-lucide="users" class="text-brand-navy h-6 w-6"></i>
              </div>
            </div>
            <div class="mt-3 text-center">
              <span
                class="font-outfit text-brand-navy text-[9px] leading-none font-black tracking-widest uppercase"
                >Resources</span
              >
            </div>
          </div>

          <!-- Node 4: Creative (Mid Right) -->
          <div
            class="group absolute top-[15px] right-[175px] flex flex-col items-center"
          >
            <div class="relative flex h-14 w-14 items-center justify-center">
              <div
                class="bg-brand-orange/10 absolute inset-0 rounded-full blur transition-all group-hover:blur-md"
              ></div>
              <div
                class="group-hover:border-brand-orange relative flex h-14 w-14 items-center justify-center rounded-full border-2 border-slate-50 bg-white shadow-lg transition-transform group-hover:scale-110"
              >
                <i data-lucide="palette" class="text-brand-orange h-6 w-6"></i>
              </div>
            </div>
            <div class="mt-3 text-center">
              <span
                class="font-outfit text-brand-navy text-[9px] leading-none font-black tracking-widest uppercase"
                >Creative</span
              >
            </div>
          </div>

          <!-- Node 5: Sales (Right Bottom) -->
          <div
            class="group absolute top-[80px] right-[65px] flex flex-col items-center"
          >
            <div class="relative flex h-14 w-14 items-center justify-center">
              <div
                class="bg-brand-red/10 absolute inset-0 rounded-full blur transition-all group-hover:blur-md"
              ></div>
              <div
                class="group-hover:border-brand-red relative flex h-14 w-14 items-center justify-center rounded-full border-2 border-slate-50 bg-white shadow-lg transition-transform group-hover:scale-110"
              >
                <i data-lucide="trending-up" class="text-brand-red h-6 w-6"></i>
              </div>
            </div>
            <div class="mt-3 text-center">
              <span
                class="font-outfit text-brand-navy text-[9px] leading-none font-black tracking-widest uppercase"
                >Sales</span
              >
            </div>
          </div>

          <!-- Main Core Hub (Elevated Center) -->
          <div class="group absolute bottom-[0px] left-1/2 -translate-x-1/2">
            <div class="relative flex h-48 w-48 items-center justify-center">
              <div
                class="absolute inset-0 rounded-full bg-slate-100 opacity-50 blur-2xl transition-opacity group-hover:opacity-100"
              ></div>
              <div
                class="relative flex h-40 w-40 flex-col items-center justify-center rounded-full border-[12px] border-slate-50 bg-white shadow-2xl transition-transform group-hover:scale-105"
              >
                <i
                  data-lucide="shield-check"
                  class="text-brand-red mb-3 h-12 w-12"
                ></i>
                <div
                  class="font-outfit text-brand-navy mb-2 text-[14px] leading-none font-black tracking-[0.2em] uppercase"
                >
                  Management
                </div>
                <div class="bg-brand-red h-1 w-8 rounded-full"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="z-20 flex items-center justify-end px-12 pb-10">
        <div class="flex items-center gap-3">
          <div class="text-right">
            <div
              class="font-outfit text-brand-navy text-[10px] leading-none font-black tracking-widest uppercase"
            >
              Core Network
            </div>
            <div
              class="mt-1 text-[8px] font-bold tracking-widest text-slate-400 uppercase"
            >
              Foundational Infrastructure Model
            </div>
          </div>
          <div class="mx-2 h-10 w-[2px] bg-slate-100"></div>
          <div
            class="bg-brand-navy font-outfit flex h-10 w-10 items-center justify-center rounded-lg text-sm font-black text-white shadow-lg"
          >
            08
          </div>
        </div>
      </div>
    </div>

    <script>
      window.addEventListener("load", function () {
        lucide.createIcons()
      })
    </script>
  </body>
</html>
