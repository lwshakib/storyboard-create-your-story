<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slide 6 - Concentric Service Model</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              outfit: ["Outfit", "sans-serif"],
            },
            colors: {
              brand: {
                navy: "#2A3A4A",
                orange: "#C65C17",
                green: "#2D5A27",
                red: "#8B1111",
              },
            },
          },
        },
      }
    </script>
  </head>
  <body
    class="flex min-h-screen items-center justify-center overflow-hidden bg-neutral-100 font-sans"
  >
    <!-- Fixed Area Container (960x540) -->
    <div
      class="relative flex h-[540px] w-[960px] flex-col overflow-hidden bg-white shadow-2xl"
    >
      <!-- Header -->
      <div class="z-20 flex items-end justify-between px-12 pt-10">
        <div>
          <h1
            class="font-outfit text-brand-navy text-2xl leading-none font-black tracking-tighter uppercase"
          >
            Service Architecture
          </h1>
          <p
            class="mt-1 text-[10px] font-bold tracking-[0.2em] text-slate-400 uppercase"
          >
            Concentric Operational Ecosystem
          </p>
        </div>
        <div class="mx-8 mb-1 flex-1 border-b-[3px] border-slate-100"></div>
        <div
          class="font-outfit text-brand-navy/30 mb-1 text-[10px] font-black tracking-widest uppercase"
        >
          Phase 06 / 2024
        </div>
      </div>

      <div class="relative mt-6 flex flex-1 items-center justify-center px-16">
        <!-- Concentric Diagram Container -->
        <div
          class="relative flex h-[360px] w-[800px] items-center justify-center"
        >
          <!-- Left Hand Labels (Interactive Flow) -->
          <div
            class="absolute top-1/2 left-0 flex -translate-y-1/2 flex-col gap-10"
          >
            <div
              class="group flex cursor-pointer items-center gap-4 transition-transform hover:scale-105"
            >
              <div
                class="font-outfit text-brand-navy w-20 text-right text-[10px] leading-none font-black tracking-[0.1em] uppercase opacity-80"
              >
                Global Strategy
              </div>
              <div
                class="group-hover:border-brand-red flex h-8 w-8 items-center justify-center rounded-full border-2 border-slate-100 bg-slate-50 shadow-lg"
              >
                <i data-lucide="crosshair" class="text-brand-red h-4 w-4"></i>
              </div>
            </div>
            <div
              class="group flex cursor-pointer items-center gap-4 transition-transform hover:scale-105"
            >
              <div
                class="font-outfit text-brand-navy w-20 text-right text-[10px] leading-none font-black tracking-[0.1em] uppercase opacity-80"
              >
                System Flow
              </div>
              <div
                class="group-hover:border-brand-navy flex h-8 w-8 items-center justify-center rounded-full border-2 border-slate-100 bg-slate-50 shadow-lg"
              >
                <i data-lucide="activity" class="text-brand-navy h-4 w-4"></i>
              </div>
            </div>
          </div>

          <!-- Right Hand Labels -->
          <div
            class="absolute top-1/2 right-0 flex -translate-y-1/2 flex-col gap-10"
          >
            <div
              class="group flex cursor-pointer flex-row-reverse items-center gap-4 transition-transform hover:scale-105"
            >
              <div
                class="font-outfit text-brand-navy w-20 text-left text-[10px] leading-none font-black tracking-[0.1em] uppercase opacity-80"
              >
                Market Growth
              </div>
              <div
                class="group-hover:border-brand-orange flex h-8 w-8 items-center justify-center rounded-full border-2 border-slate-100 bg-slate-50 shadow-lg"
              >
                <i
                  data-lucide="trending-up"
                  class="text-brand-orange h-4 w-4"
                ></i>
              </div>
            </div>
            <div
              class="group flex cursor-pointer flex-row-reverse items-center gap-4 transition-transform hover:scale-105"
            >
              <div
                class="font-outfit text-brand-navy w-20 text-left text-[10px] leading-none font-black tracking-[0.1em] uppercase opacity-80"
              >
                Infrastructure
              </div>
              <div
                class="group-hover:border-brand-green flex h-8 w-8 items-center justify-center rounded-full border-2 border-slate-100 bg-slate-50 shadow-lg"
              >
                <i data-lucide="database" class="text-brand-green h-4 w-4"></i>
              </div>
            </div>
          </div>

          <!-- Central Rings (Depth Effect) -->
          <div
            class="relative flex h-[340px] w-[340px] items-center justify-center"
          >
            <!-- Outer Layer (Level 03) -->
            <div
              class="border-brand-green/30 absolute inset-0 rounded-full border-[10px] [mask-image:conic-gradient(#000_0deg_360deg)] shadow-inner"
            ></div>
            <div
              class="bg-brand-green/90 absolute top-[20px] left-1/2 z-50 -translate-x-1/2 transform rounded px-3 py-1 shadow-xl group-hover:scale-105"
            >
              <span
                class="font-outfit text-[8px] leading-none font-black tracking-widest whitespace-nowrap text-white uppercase"
                >L3: Operational Scope</span
              >
            </div>

            <!-- Middle Layer (Level 02) -->
            <div
              class="border-brand-navy/30 absolute flex h-[240px] w-[240px] items-center justify-center rounded-full border-[10px] shadow-lg"
            >
              <div
                class="bg-brand-navy/90 absolute top-[-15px] left-1/2 z-50 -translate-x-1/2 transform rounded px-3 py-1 shadow-xl group-hover:scale-105"
              >
                <span
                  class="font-outfit text-[8px] leading-none font-black tracking-widest whitespace-nowrap text-white uppercase"
                  >L2: Strategic Core</span
                >
              </div>
            </div>

            <!-- Inner Core Hub -->
            <div
              class="bg-brand-red group relative z-40 flex h-32 w-32 cursor-pointer flex-col items-center justify-center rounded-full border-[6px] border-white/20 p-4 text-center shadow-2xl transition-transform hover:scale-105 active:translate-y-px"
            >
              <h5
                class="font-outfit mt-1 text-[13px] leading-none font-black tracking-wider text-white uppercase"
              >
                Innovation
              </h5>
              <div class="mt-2 h-[2px] w-6 bg-white opacity-40"></div>
              <p
                class="mt-2 font-sans text-[8px] leading-tight font-bold text-white/70 italic"
              >
                Mission Critical Hub
              </p>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="z-20 flex items-center justify-end px-12 pb-10">
        <div class="flex items-center gap-3">
          <div class="text-right">
            <div
              class="font-outfit text-brand-navy text-[10px] leading-none font-black tracking-widest uppercase"
            >
              Global Operations
            </div>
            <div
              class="mt-1 text-[8px] font-bold tracking-widest text-slate-400 uppercase"
            >
              Foundational Process Stack
            </div>
          </div>
          <div class="mx-2 h-10 w-[2px] bg-slate-100"></div>
          <div
            class="bg-brand-navy font-outfit flex h-10 w-10 items-center justify-center rounded-lg text-sm font-black text-white shadow-lg"
          >
            06
          </div>
        </div>
      </div>
    </div>

    <script>
      window.addEventListener("load", function () {
        lucide.createIcons()
      })
    </script>
  </body>
</html>
